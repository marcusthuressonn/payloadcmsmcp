[build]
builder = "NIXPACKS"
buildCommand = "npm install"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[template]
name = "Payload CMS MCP Server"
description = "A Model Context Protocol server for Payload CMS 3.0 (Streamable HTTP) that validates code, generates templates, and scaffolds projects following best practices."
tags = ["nodejs", "express", "payload-cms", "mcp", "ai"]
icon = "https://www.payloadcmsmcp.info/logopayload.png"
